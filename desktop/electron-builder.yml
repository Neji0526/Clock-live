# Cross-platform packaging for ClockWork Desktop.
# Produces three distributables:
#   Windows -> ClockWork-Setup-<version>.exe   (NSIS installer)
#   macOS   -> ClockWork-<version>.dmg         (must be built on macOS/CI)
#   Linux   -> ClockWork-<version>.AppImage + .deb
appId: com.clockwork.desktop
productName: ClockWork
copyright: Copyright © ClockWork

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - build/icon.png
  - package.json
  - "!**/*.map"

# active-win ships platform helper binaries that must live outside the asar.
asarUnpack:
  - "**/node_modules/active-win/**"

win:
  target:
    - nsis
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: ClockWork-Setup-${version}.${ext}

mac:
  # Ship two per-arch DMGs — arm64 (Apple Silicon) and x64 (Intel).
  # Building only the CI runner's arch (macos-latest is now Apple Silicon)
  # produced an arm64-only DMG that Intel Macs reject with "not supported on
  # this Mac". A single "universal" DMG is nicer UX but its @electron/universal
  # merge step chokes on active-win's native helper, so we build the two arches
  # separately instead — no merge, both CPU families covered.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  icon: build/icon.png
  artifactName: ClockWork-${version}-${arch}.${ext}
  # desktopCapturer + active-win need Screen Recording permission on macOS.
  extendInfo:
    NSCameraUsageDescription: ClockWork captures periodic screenshots while you are clocked in.

dmg:
  artifactName: ClockWork-${version}-${arch}.${ext}

linux:
  # AppImage only — the portable, runnable Linux file. The .deb target needs
  # extra dpkg/fpm tooling and strict metadata and is the usual cause of Linux
  # CI failures; the AppImage is what users actually run.
  target:
    - AppImage
  category: Utility
  icon: build/icon.png
  artifactName: ClockWork-${version}.${ext}
  maintainer: ClockWork <support@clockwork.app>
  synopsis: Transparent time and work tracker for virtual assistants.
