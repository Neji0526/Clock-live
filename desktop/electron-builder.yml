# Cross-platform packaging for ClockWork Desktop.
# Produces three distributables:
#   Windows -> ClockWork-Setup-<version>.exe   (NSIS installer)
#   macOS   -> ClockWork-<version>.dmg         (must be built on macOS/CI)
#   Linux   -> ClockWork-<version>.AppImage + .deb
appId: com.clockwork.desktop
productName: ClockWork
copyright: Copyright © ClockWork

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - build/icon.png
  - package.json
  - "!**/*.map"

# active-win ships platform helper binaries that must live outside the asar.
asarUnpack:
  - "**/node_modules/active-win/**"

win:
  target:
    - nsis
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: ClockWork-Setup-${version}.${ext}

mac:
  # Universal = one app bundle holding BOTH arm64 (Apple Silicon) and x64
  # (Intel) slices, so a single .dmg runs on every Mac. Without this,
  # electron-builder builds only for the CI runner's arch (arm64 on
  # macos-latest), which fails on Intel Macs with "not supported on this Mac".
  target:
    - target: dmg
      arch:
        - universal
  # On macOS active-win uses ONLY its prebuilt universal Mach-O `main` binary
  # (lib/macos.js spawns it via child_process). It never loads the native
  # `.node` addon on darwin. But active-win ships those .node addons for BOTH
  # arches (lib/binding/napi-6-darwin-unknown-{arm64,x64}), and @electron/
  # universal tries to lipo-merge them across the x64/arm64 app builds — which
  # fails ("same architectures (arm64) ... can't be in the same fat file"),
  # plus the node-gyp rebuild leaves non-Mach-O intermediates that also can't
  # be reconciled. None are used at runtime on macOS, so strip every .node
  # addon + build intermediate here. (mac-only: Windows still needs its addon.)
  files:
    - "!**/node_modules/active-win/**/*.node"
    - "!**/node_modules/active-win/build/**"
    - "!**/node_modules/active-win/build-tmp-*/**"
    - "!**/node_modules/active-win/lib/binding/**"
  category: public.app-category.productivity
  icon: build/icon.png
  artifactName: ClockWork-${version}.${ext}
  # desktopCapturer + active-win need Screen Recording permission on macOS.
  extendInfo:
    NSCameraUsageDescription: ClockWork captures periodic screenshots while you are clocked in.

dmg:
  artifactName: ClockWork-${version}.${ext}

linux:
  # AppImage only — the portable, runnable Linux file. The .deb target needs
  # extra dpkg/fpm tooling and strict metadata and is the usual cause of Linux
  # CI failures; the AppImage is what users actually run.
  target:
    - AppImage
  category: Utility
  icon: build/icon.png
  artifactName: ClockWork-${version}.${ext}
  maintainer: ClockWork <support@clockwork.app>
  synopsis: Transparent time and work tracker for virtual assistants.
